<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TaaDa MCU1 — log</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body { margin: 0; padding: 0; background: #000; color: #0f0; }
body { padding: 8px; font: 13px/1.4 monospace; }
h1 { color: #fff; font-size: 14px; margin: 0 0 8px 0; padding: 0; }
.sub { color: #888; font-size: 11px; margin-bottom: 8px; }
pre { white-space: pre-wrap; word-break: break-all; margin: 0; padding: 6px;
      background: rgba(0,255,0,0.04); border: 1px solid #050; }
.err { color: #f55; }
.info { color: #aaa; font-style: italic; }
.meta { color: #777; font-size: 11px; margin-top: 8px; white-space: pre-wrap; }
.summary { white-space: pre-wrap; word-break: break-all; margin: 0 0 8px 0;
      padding: 8px; background: #021; border: 1px solid #0a0; color: #6f6;
      font-size: 13px; }
.summary b { color: #fff; }
.summary .bad { color: #f55; }
.summary .ok { color: #9f9; }
</style>
</head>
<body>
<h1>TaaDa MCU1 — diagnostic log (read-only)</h1>
<div class="sub">Reads localStorage["mcu1-trace"] only. No worker, no decoder, no fetch, no alert. Cannot crash.</div>
<div class="summary" id="summary">(parsing...)</div>
<pre id="log">(initializing...)</pre>
<div class="meta" id="meta"></div>
<script>
/* Pure ES5. Reads the trace the legacy bundle wrote to localStorage on its
   previous run. The STATUS block at the top is parsed from the trace so a
   single photo of this page shows where the stream stalled — no scrolling
   past the ~5s heartbeats needed. */
(function () {
    var pre = document.getElementById('log');
    var meta = document.getElementById('meta');
    var summaryEl = document.getElementById('summary');
    var log;
    try {
        log = localStorage.getItem('mcu1-trace');
    } catch (e) {
        pre.className = 'err';
        pre.textContent = '!! localStorage is not accessible: ' + (e && e.message ? e.message : String(e));
        summaryEl.textContent = '(localStorage unavailable)';
        return;
    }
    if (log === null) {
        pre.className = 'info';
        pre.textContent =
            '(no "mcu1-trace" key in localStorage)\n\n' +
            'localStorage itself works, but nothing was written.\n' +
            'Either the legacy bundle never reached its first _mcu1Trace\n' +
            'call, or localStorage is per-page on this browser.';
        summaryEl.textContent = '(no trace yet — bundle never reached _mcu1Trace)';
    } else if (log === '') {
        pre.className = 'info';
        pre.textContent = '(empty string stored)';
        summaryEl.textContent = '(trace is empty)';
    } else {
        pre.textContent = log;
        summaryEl.innerHTML = buildSummary(log);
    }
    var info = 'now:      ' + new Date().toString() + '\n';
    info += 'log size: ' + (log == null ? '(null)' : log.length + ' chars') + '\n';
    info += 'UA:       ' + (navigator.userAgent || '?');
    meta.textContent = info;
    // Scroll to the TOP (the summary), not the heartbeat tail, so the first
    // thing a tester photographs is the diagnostic state.
    window.scrollTo(0, 0);

    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function buildSummary(text) {
        var all = text.split('\n');
        // Scope to the most recent session (everything after the last marker).
        var start = 0, i;
        for (i = all.length - 1; i >= 0; i--) {
            if (all[i].indexOf('--- new session ---') !== -1) { start = i + 1; break; }
        }
        var lines = all.slice(start);
        var mainBeat = null, workerBeat = null, lastEvent = null, errs = [];
        var connects = 0, b1open = false, lastReconnect = null, pongSuppressed = false;
        for (i = 0; i < lines.length; i++) {
            var ln = lines[i];
            if (!ln) continue;
            if (ln.indexOf('startSocket: new WebSocket') !== -1) { connects++; }
            if (ln.indexOf('B1 control WS open') !== -1) { b1open = true; }
            if (ln.indexOf('RECONNECT') !== -1) { lastReconnect = ln; }
            if (ln.indexOf('pong lag') !== -1 && ln.indexOf('NOT reconnecting') !== -1) { pongSuppressed = true; }
            if (ln.indexOf('~5s main:') !== -1) { mainBeat = ln; continue; }
            if (ln.indexOf('~5s worker:') !== -1) { workerBeat = ln; continue; }
            if (ln.indexOf('!!') !== -1 || ln.indexOf('[alert blocked]') !== -1 || ln.indexOf('threw') !== -1) { errs.push(ln); }
            lastEvent = ln; // last non-heartbeat trace = furthest step reached
        }
        var html = '';
        html += '<b>last step</b> : ' + (lastEvent ? esc(lastEvent) : '(none)') + '\n';
        html += '<b>main</b>      : ' + (mainBeat ? esc(mainBeat) : '(no heartbeat yet)') + '\n';
        html += '<b>worker</b>    : ' + (workerBeat ? esc(workerBeat) : '(no heartbeat yet)') + '\n';
        var reconns = connects > 0 ? connects - 1 : 0;
        html += '<b>reconnects</b>: ' + (reconns > 0 ? '<span class="bad">' + reconns + ' (' + connects + ' connects — the flicker)</span>' : '0') + '\n';
        html += '<b>B1 chan</b>   : ' + (b1open ? 'OPEN (control socket up)' : 'not opened (build 65, or +3 port unreachable)') + '\n';
        if (lastReconnect) { html += '<b>last reconn</b>: ' + esc(lastReconnect) + '\n'; }
        if (pongSuppressed) { html += '<b>pong fix</b>  : <span class="ok">active</span> (mjpeg pong-lag suppressed, video=liveness)\n'; }
        if (errs.length) {
            html += '<b>errors</b>    : <span class="bad">' + errs.length + ' — ' + esc(errs[errs.length - 1]) + '</span>';
        } else {
            html += '<b>errors</b>    : none';
        }
        return html;
    }
})();
</script>
</body>
</html>
