<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MCU1 render-bench v3 (cache-free)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    #cv, #imA, #bg { display: none; }
    #cv, #imA { width: 100%; height: auto; }
    #bg { width: 480px; height: 270px; background-size: cover; background-repeat: no-repeat; }
    #stats {
      position: fixed; top: 8px; left: 8px;
      color: #0f0; font-family: monospace; font-weight: bold;
      background: rgba(0,0,0,0.8); padding: 8px 14px; border-radius: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <canvas id="cv" width="480" height="270"></canvas>
  <img id="imA" width="480" height="270" />
  <div id="bg"></div>
  <div id="stats">preparing…</div>
  <script>
  (function () {
    var cv = document.getElementById('cv'), ctx = cv.getContext('2d');
    var imA = document.getElementById('imA'), bg = document.getElementById('bg');
    var statsEl = document.getElementById('stats');
    var W = 480, H = 270, FRAMES = 120; // enough unique frames that a measurement
    // window (~4 s) never repeats one — defeats the decoded-image cache entirely.

    var jpgData = [], jpgBytes = [];
    var gen = document.createElement('canvas'); gen.width = W; gen.height = H;
    var gctx = gen.getContext('2d');

    function dataUrlToBytes(d) {
      var b64 = d.substring(d.indexOf(',') + 1), bin = atob(b64), a = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
      return a;
    }
    function buildFrame(n) {
      gctx.fillStyle = '#102030'; gctx.fillRect(0, 0, W, H);
      gctx.fillStyle = '#0af'; gctx.fillRect((n * 11) % W, 0, Math.round(W / 9), H);
      gctx.fillStyle = '#1a3a5a'; gctx.fillRect((n * 17) % W, H - 44, 64, 44);
      gctx.fillStyle = '#3a1a4a'; gctx.fillRect(0, (n * 7) % H, W, 18);
      gctx.fillStyle = '#fff'; gctx.font = Math.round(H / 6) + 'px monospace';
      gctx.fillText('f' + n, 20, Math.round(H / 2));
      var j = gen.toDataURL('image/jpeg', 0.6);
      jpgData.push(j); jpgBytes.push(dataUrlToBytes(j));
    }

    var raf = window.requestAnimationFrame || window.webkitRequestAnimationFrame || function (cb) { return setTimeout(cb, 16); };
    var rafCount = 0;
    (function loop() { rafCount++; raf(loop); })();

    var idx = 0, shown = 0, runGen = 0;
    function showOnly(el) {
      cv.style.display = el === 'cv' ? 'block' : 'none';
      imA.style.display = el === 'imA' ? 'block' : 'none';
      bg.style.display = el === 'bg' ? 'block' : 'none';
    }

    // canvas2d: blob URL -> Image decode -> drawImage (never cached, true decode)
    function loopCanvas(g) {
      if (g !== runGen) return;
      var url; try { url = URL.createObjectURL(new Blob([jpgBytes[(idx++) % FRAMES]], { type: 'image/jpeg' })); } catch (e) { return; }
      var im = new Image();
      im.onload = function () { if (g !== runGen) { try { URL.revokeObjectURL(url); } catch (e) {} return; } try { ctx.drawImage(im, 0, 0, W, H); } catch (e) {} shown++; try { URL.revokeObjectURL(url); } catch (e) {} loopCanvas(g); };
      im.onerror = function () { try { URL.revokeObjectURL(url); } catch (e) {} if (g === runGen) loopCanvas(g); };
      im.src = url;
    }
    // img-data: data URI straight into a visible <img>
    function loopImgData(g) {
      if (g !== runGen) return;
      imA.onload = function () { if (g !== runGen) return; shown++; loopImgData(g); };
      imA.onerror = function () { if (g === runGen) loopImgData(g); };
      imA.src = jpgData[(idx++) % FRAMES];
    }
    // css-bg (preload): decode via off-DOM Image (onload) then set as background
    function loopCssPre(g) {
      if (g !== runGen) return;
      var u = jpgData[(idx++) % FRAMES];
      var im = new Image();
      im.onload = function () { if (g !== runGen) return; bg.style.backgroundImage = 'url(' + u + ')'; shown++; loopCssPre(g); };
      im.onerror = function () { if (g === runGen) loopCssPre(g); };
      im.src = u;
    }
    // css-direct: assign data URI to background with no preload, paced by rAF so we
    // measure real composites (one bg change per repaint).
    var cssDirectOn = false;
    function tickCssDirect() {
      if (!cssDirectOn) return;
      bg.style.backgroundImage = 'url(' + jpgData[(idx++) % FRAMES] + ')';
      shown++;
      raf(tickCssDirect);
    }

    var PHASES = [
      { name: 'idle',       el: 'cv',  start: null, secs: 3 },
      { name: 'canvas2d',   el: 'cv',  start: function (g) { loopCanvas(g); }, secs: 4 },
      { name: 'img-data',   el: 'imA', start: function (g) { loopImgData(g); }, secs: 4 },
      { name: 'css-preload', el: 'bg', start: function (g) { loopCssPre(g); }, secs: 4 },
      { name: 'css-direct',  el: 'bg', start: function (g) { cssDirectOn = true; raf(tickCssDirect); }, secs: 4 }
    ];
    var results = {}, phaseIdx = -1, phase = null, phaseSec = 0, done = false;
    var shownSum = 0, rafSum = 0, nSamp = 0, idleRaf = 0;

    function render() {
      var html = done ? '<div style="font-size:28px;color:#0ff">DONE &mdash; PHOTO</div>'
                      : '<div style="font-size:20px;color:#ff0">running ' + (phase ? phase.name : '') + '… ' + phaseSec + '/' + (phase ? phase.secs : 0) + 's</div>';
      html += '<div style="font-size:22px;margin-top:5px">idle refresh: ' + idleRaf + '/s · ' + FRAMES + ' uniq</div>';
      html += '<div style="font-size:19px;margin-top:5px">';
      for (var i = 1; i < PHASES.length; i++) {
        var n = PHASES[i].name, r = results[n];
        html += n + ': ' + (r ? ('~' + r.vis + ' vis (load ' + r.shown + ', rAF ' + r.raf + ')') : '…') + '<br>';
      }
      html += '</div>';
      statsEl.innerHTML = html;
    }
    function startPhase() {
      cssDirectOn = false;
      phaseIdx++;
      if (phaseIdx >= PHASES.length) { done = true; runGen++; render(); return; }
      phase = PHASES[phaseIdx];
      runGen++; idx = 0; shown = 0;
      showOnly(phase.el);
      if (phase.start) phase.start(runGen);
      phaseSec = 0; shownSum = 0; rafSum = 0; nSamp = 0;
    }
    function buildAll(cb) {
      var b = 0;
      (function bn() {
        try { buildFrame(b); b++; statsEl.innerHTML = 'preparing… ' + b + '/' + FRAMES; if (b < FRAMES) { setTimeout(bn, 0); return; } cb(); }
        catch (e) { statsEl.style.color = '#f55'; statsEl.innerHTML = 'ENCODE ERR: ' + (e && e.message ? e.message : e); }
      })();
    }
    buildAll(function () {
      startPhase();
      setInterval(function () {
        if (done) return;
        var raf1 = rafCount; rafCount = 0; var sh1 = shown; shown = 0;
        phaseSec++;
        if (phaseSec > 1) { rafSum += raf1; shownSum += sh1; nSamp++; }
        if (phase && phase.name === 'idle') idleRaf = nSamp ? Math.round(rafSum / nSamp) : raf1;
        render();
        if (phase && phaseSec >= phase.secs) {
          if (phase.name !== 'idle') {
            var sh = nSamp ? Math.round(shownSum / nSamp) : 0, rf = nSamp ? Math.round(rafSum / nSamp) : 0;
            results[phase.name] = { shown: sh, raf: rf, vis: Math.min(sh, rf) };
          }
          startPhase();
        }
      }, 1000);
    });
  })();
  </script>
</body>
</html>
