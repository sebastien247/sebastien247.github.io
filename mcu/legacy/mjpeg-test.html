<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MCU1 decode// + rAF-paced paint test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    #out { display: block; width: 100%; height: auto; }
    #stats {
      position: fixed; top: 8px; left: 8px;
      color: #0f0; font-family: monospace; font-weight: bold;
      background: rgba(0,0,0,0.78); padding: 8px 14px; border-radius: 4px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <canvas id="out" width="480" height="270"></canvas>
  <div id="stats">preparing…</div>
  <script src="jpeg-renderer.js"></script>
  <script>
  (function () {
    var out = document.getElementById('out');
    var ctx = out.getContext('2d');
    var statsEl = document.getElementById('stats');
    var W = 480, H = 270, FRAMES = 12;

    var pre = [];
    var gen = document.createElement('canvas');
    gen.width = W; gen.height = H;
    var gctx = gen.getContext('2d');

    function canvasToJpegBytes(c) {
      var dataUrl = c.toDataURL('image/jpeg', 0.6);
      var base64 = dataUrl.substring(dataUrl.indexOf(',') + 1);
      var bin = atob(base64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }
    function buildFrame(n) {
      gctx.fillStyle = '#102030'; gctx.fillRect(0, 0, W, H);
      gctx.fillStyle = '#0af'; gctx.fillRect((n * (W / FRAMES)) % W, 0, Math.round(W / 9), H);
      gctx.fillStyle = '#fff'; gctx.font = Math.round(H / 6) + 'px monospace';
      gctx.fillText('f' + n, 20, Math.round(H / 2));
      return canvasToJpegBytes(gen);
    }

    // Real renderer architecture under test: frames arrive at a fixed input rate
    // (like the phone over the socket), up to K decode in parallel, and the rAF
    // loop paints only the freshest decoded image once per repaint. Input is
    // CADENCED (not a tight loop) so it never starves the rAF.
    var K = 0, active = 0, pending = null, poolGen = 0;
    var latest = null, latestVer = 0, drawnVer = 0;
    var completed = 0, displayed = 0, fed = 0, seqIdx = 0;

    function pump() {
      while (active < K && pending) { var b = pending; pending = null; decodeOne(b); }
    }
    function feed(bytes) { pending = bytes; fed++; pump(); }
    function decodeOne(bytes) {
      var g = poolGen, url;
      try { url = URL.createObjectURL(new Blob([bytes], { type: 'image/jpeg' })); }
      catch (e) { return; }
      active++;
      var img = new Image();
      function finish(ok) {
        try { URL.revokeObjectURL(url); } catch (e) {}
        active--;
        if (g !== poolGen) return; // stale generation — ignore
        if (ok) { latest = img; latestVer++; completed++; }
        pump();
      }
      img.onload = function () { finish(true); };
      img.onerror = function () { finish(false); };
      img.src = url;
    }
    function setK(k) { poolGen++; K = k; pending = null; } // chains self-decrement active

    // Cadenced input: ~50 frames/s offered (more than MCU1 can decode, so the
    // pool always has fresh work; excess is dropped via the single pending slot).
    setInterval(function () { if (pre.length) feed(pre[(seqIdx++) % FRAMES]); }, 20);

    // rAF loop: measure repaint rate AND paint the freshest frame once/repaint.
    var raf = window.requestAnimationFrame || window.webkitRequestAnimationFrame ||
              function (cb) { return setTimeout(cb, 16); };
    var rafCount = 0;
    (function loop() {
      rafCount++;
      if (latest && latestVer !== drawnVer) {
        drawnVer = latestVer;
        try { ctx.drawImage(latest, 0, 0, W, H); displayed++; } catch (e) {}
      }
      raf(loop);
    })();

    var PHASES = [
      { name: 'idle', K: 0, secs: 4 },
      { name: '//2',  K: 2, secs: 6 },
      { name: '//4',  K: 4, secs: 6 },
      { name: '//8',  K: 8, secs: 6 }
    ];
    var results = {}, phaseIdx = -1, phase = null, phaseSec = 0, done = false;
    var dispSum = 0, rafSum = 0, decSum = 0, nSamp = 0, idleRaf = 0;

    function render() {
      var html;
      if (done) html = '<div style="font-size:30px;color:#0ff">DONE &mdash; PHOTO</div>';
      else html = '<div style="font-size:22px;color:#ff0">running ' + (phase ? phase.name : '') + '… ' + phaseSec + '/' + (phase ? phase.secs : 0) + 's</div>';
      html += '<div style="font-size:24px;margin-top:6px">idle refresh: ' + idleRaf + '/s</div>';
      html += '<div style="font-size:20px;margin-top:6px">';
      for (var i = 1; i < PHASES.length; i++) {
        var n = PHASES[i].name;
        var r = results[n];
        html += 'decode' + n + ': ' + (r ? (r.disp + ' fps shown (rAF ' + r.raf + ', dec ' + r.dec + ')') : '…') + '<br>';
      }
      html += '</div>';
      statsEl.innerHTML = html;
    }

    function startPhase() {
      phaseIdx++;
      if (phaseIdx >= PHASES.length) { done = true; setK(0); render(); return; }
      phase = PHASES[phaseIdx];
      setK(phase.K);
      phaseSec = 0; dispSum = 0; rafSum = 0; decSum = 0; nSamp = 0;
    }

    function buildAll(cb) {
      statsEl.innerHTML = 'preparing…';
      var b = 0;
      (function bn() {
        try { pre.push(buildFrame(b)); b++; if (b < FRAMES) { setTimeout(bn, 0); return; } cb(); }
        catch (e) { statsEl.style.color = '#f55'; statsEl.innerHTML = 'ENCODE ERR: ' + (e && e.message ? e.message : e); }
      })();
    }

    buildAll(function () {
      startPhase();
      setInterval(function () {
        if (done) return;
        var raf1s = rafCount; rafCount = 0;
        var disp1s = displayed; displayed = 0;
        var dec1s = completed; completed = 0;
        fed = 0;
        phaseSec++;
        if (phaseSec > 1) { rafSum += raf1s; dispSum += disp1s; decSum += dec1s; nSamp++; }
        if (phase && phase.name === 'idle') idleRaf = nSamp ? Math.round(rafSum / nSamp) : raf1s;
        render();
        if (phase && phaseSec >= phase.secs) {
          if (phase.name !== 'idle') {
            results[phase.name] = {
              disp: nSamp ? Math.round(dispSum / nSamp) : 0,
              raf: nSamp ? Math.round(rafSum / nSamp) : 0,
              dec: nSamp ? Math.round(decSum / nSamp) : 0
            };
          }
          startPhase();
        }
      }, 1000);
    });
  })();
  </script>
</body>
</html>
