<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MCU1 MJPEG decode benchmark</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <style>
    html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }
    #out { display: block; width: 100%; height: auto; }
    #stats {
      position: fixed; top: 8px; left: 8px;
      color: #0f0; font-family: monospace; font-weight: bold;
      background: rgba(0,0,0,0.65); padding: 8px 14px; border-radius: 4px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <canvas id="out" width="480" height="270"></canvas>
  <div id="stats">preparing…</div>
  <script src="jpeg-renderer.js"></script>
  <script>
  (function () {
    var out = document.getElementById('out');
    var statsEl = document.getElementById('stats');

    // Resolutions to benchmark, smallest first (fastest, best first impression).
    var RESOS = [[480, 270], [640, 360], [800, 480]];
    var FRAMES = 12;            // distinct pre-encoded frames per resolution
    var SECONDS_PER_RESO = 10;  // measurement window per resolution

    var painted = 0, paintedThisSec = 0, curFps = 0, shown = 0;
    var W = 0, H = 0, pre = [], results = {};
    var renderer = new JpegRenderer(out, function () { painted++; paintedThisSec++; });

    var gen = document.createElement('canvas');
    var gctx = gen.getContext('2d');

    // WebKit-601-safe JPEG encode: toDataURL + atob (NOT toBlob/FileReader).
    function canvasToJpegBytes(c) {
      var dataUrl = c.toDataURL('image/jpeg', 0.6);
      var base64 = dataUrl.substring(dataUrl.indexOf(',') + 1);
      var bin = atob(base64);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function buildFrame(n) {
      gctx.fillStyle = '#102030'; gctx.fillRect(0, 0, W, H);
      gctx.fillStyle = '#0af'; gctx.fillRect((n * (W / FRAMES)) % W, 0, Math.round(W / 9), H);
      gctx.fillStyle = '#fff'; gctx.font = Math.round(H / 7) + 'px monospace';
      gctx.fillText('frame ' + n, 24, Math.round(H / 2));
      return canvasToJpegBytes(gen);
    }

    function render() {
      var html = '<div style="font-size:30px">NOW ' + W + 'x' + H + ' &rarr; ' + curFps + ' fps</div>';
      html += '<div style="font-size:22px;margin-top:8px">';
      for (var i = 0; i < RESOS.length; i++) {
        var key = RESOS[i][0] + 'x' + RESOS[i][1];
        html += key + ': ' + (results[key] !== undefined ? results[key] + ' fps' : '…') + '<br>';
      }
      html += '</div>';
      statsEl.innerHTML = html;
    }

    var playTimer = null, fpsTimer = null, switchTimer = null;
    var resoIdx = -1;

    function nextReso() {
      resoIdx = (resoIdx + 1) % RESOS.length;
      W = RESOS[resoIdx][0]; H = RESOS[resoIdx][1];
      out.width = W; out.height = H;
      gen.width = W; gen.height = H;
      pre = []; shown = 0; curFps = 0;
      statsEl.style.color = '#ff0';
      statsEl.innerHTML = 'preparing ' + W + 'x' + H + '…';
      var built = 0;
      (function buildNext() {
        try {
          pre.push(buildFrame(built)); built++;
          if (built < FRAMES) { setTimeout(buildNext, 0); return; }
          playReso();
        } catch (e) {
          statsEl.style.color = '#f55';
          statsEl.innerHTML = 'ENCODE ERROR: ' + (e && e.message ? e.message : e);
        }
      })();
    }

    function playReso() {
      statsEl.style.color = '#0f0';
      paintedThisSec = 0;
      playTimer = setInterval(function () {
        try { renderer.paint(pre[shown % FRAMES]); shown++; }
        catch (e) { statsEl.style.color = '#f55'; statsEl.innerHTML = 'PAINT ERROR: ' + (e && e.message ? e.message : e); }
      }, 40); // push ~25 fps; renderer coalesces if decode is slower
      fpsTimer = setInterval(function () {
        curFps = paintedThisSec; paintedThisSec = 0;
        results[W + 'x' + H] = curFps;
        render();
      }, 1000);
      switchTimer = setTimeout(function () {
        clearInterval(playTimer); clearInterval(fpsTimer);
        nextReso();
      }, SECONDS_PER_RESO * 1000);
    }

    nextReso();
  })();
  </script>
</body>
</html>
